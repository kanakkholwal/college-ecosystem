name: Azure CD - Server

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - ".github/workflows/cd-server-azure.yml"
  workflow_dispatch:

concurrency:
  group: azure-server
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}/server

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # required for Azure OIDC login

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/server
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Roll out new revision
        run: |
          az containerapp update \
            --name ce-server \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE }}:${{ github.sha }}

      - name: Verify revision is healthy
        run: |
          az containerapp revision list \
            --name ce-server \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active].{name:name,state:properties.runningState}" \
            --output table
