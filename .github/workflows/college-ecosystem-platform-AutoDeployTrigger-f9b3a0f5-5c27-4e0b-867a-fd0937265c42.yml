name: Trigger auto deployment for college-ecosystem-platform

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/college-ecosystem-platform-AutoDeployTrigger-f9b3a0f5-5c27-4e0b-867a-fd0937265c42.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COLLEGEECOSYSTEMPLATFORM_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COLLEGEECOSYSTEMPLATFORM_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COLLEGEECOSYSTEMPLATFORM_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.COLLEGEECOSYSTEMPLATFORM_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COLLEGEECOSYSTEMPLATFORM_REGISTRY_PASSWORD }}
          containerAppName: college-ecosystem-platform
          resourceGroup: personal-projects
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


